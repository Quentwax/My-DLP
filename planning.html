<h1 class="titre">Mon Calendrier ✨</h1>

<!-- Calendrier -->

<!-- Modal pour ajouter des détails -->
<div id="event-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>

            <h3 id="view-date"></h3>
            <div id="view-actions" class="view-actions">
                <button id="modify-event" class="action-button modify">Modifier</button>
                <button id="delete-event" class="action-button delete">Supprimer</button>
            </div>
            <div id="view-details-container"></div>

            <button id="save-event">Sauvegarder</button>
        </div>
    </div>
</div>







                                                    <!-- Menu de contrôle de la musique -->
<audio id="music"></audio>
<script>
const music = document.getElementById("music");

// Playlist des chansons
const playlist = [
    "Kingdom Dance (From TangledScore).mp3",
    "Tales of Magic.mp3"
];
let currentSongIndex = 0;

// Charger la chanson actuelle
function loadSong(index) {
    music.src = playlist[index];
    music.load();
}

// Initialiser avec la première chanson
loadSong(currentSongIndex);

window.addEventListener("load", () => {
    // RESTAURER LE TEMPS
    let time = parseFloat(localStorage.getItem("musicTime"));
    if (!isNaN(time)) {
        music.currentTime = time;
    }

    // RESTAURER LE VOLUME
    let savedVolume = parseFloat(localStorage.getItem("musicVolume"));
    if (!isNaN(savedVolume)) {
        music.volume = savedVolume;
        volumeSlider.value = savedVolume;
    } else {
        music.volume = 0.5;
        volumeSlider.value = 0.5;
    }

    // RESTAURER L'ÉTAT DE LECTURE
    let wasPlaying = localStorage.getItem("musicPlaying") === "true";
    if (wasPlaying) {
        let promise = music.play();
        if (promise !== undefined) {
            promise.catch(() => {
                // Navigation inter-pages peut empêcher autoplay sans interaction utilisateur
                console.log("Lecture automatique bloquée, appuyez sur Play.");
            });
        }
    } else {
        music.pause();
    }

    playPauseBtn.textContent = music.paused ? "▶️" : "⏸️";
});

/* SAUVEGARDER EN CONTINU */
setInterval(() => {
    localStorage.setItem("musicTime", music.currentTime);
}, 500);
</script>
<script>
window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", music.currentTime);
});
</script>


<div id="music-floating-btn">🎵</div>
<div id="music-controls" class="hidden">
    <button id="play-pause-btn">⏸️</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
</div>

<script>
const playPauseBtn = document.getElementById("play-pause-btn");
const volumeSlider = document.getElementById("volume-slider");
const floatingBtn = document.getElementById("music-floating-btn");
const controls = document.getElementById("music-controls");

// Initialiser le volume au chargement (sera écrasé par la restauration ci-dessus)
music.volume = 0.5;

// Toggle contrôle
floatingBtn.addEventListener("click", () => {
    controls.classList.toggle("hidden");
});

// Lecture/pause
playPauseBtn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        playPauseBtn.textContent = "⏸️";
        localStorage.setItem("musicPlaying", "true");
    } else {
        music.pause();
        playPauseBtn.textContent = "▶️";
        localStorage.setItem("musicPlaying", "false");
    }
});

// Slider volume
volumeSlider.addEventListener("input", () => {
    music.volume = parseFloat(volumeSlider.value);
    localStorage.setItem("musicVolume", music.volume.toString());
});

// Mettre à jour l'icône quand la musique se termine
music.addEventListener("ended", () => {
    playPauseBtn.textContent = "▶️";
    localStorage.setItem("musicPlaying", "false");
});

// Sauvegarder le statut lors de changement immédiat
music.addEventListener("pause", () => {
    localStorage.setItem("musicPlaying", "false");
});

music.addEventListener("play", () => {
    localStorage.setItem("musicPlaying", "true");
});
</script>
                                                <!-- FIN Menu de contrôle de la musique -->

<!-- Script pour le calendrier -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBb-2GlOsnUDzDXZ8-mgd6XIr8ny4ZkJoo",
  authDomain: "my-disneyland-paris.firebaseapp.com",
  databaseURL: "https://my-disneyland-paris-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "my-disneyland-paris",
  storageBucket: "my-disneyland-paris.firebasestorage.app",
  messagingSenderId: "787833723893",
  appId: "1:787833723893:web:0cd3c3f0f01dd7e8c09ebc"
};

// INITIALISATION (dans le bon ordre)
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// REF
const eventsRef = ref(db, 'planning/events');

let currentDate = new Date();
let events = {};
let selectedDate = null;
let editingEventId = null;

function getEventsForDate(dateStr) {
    return Object.entries(events).filter(([id, event]) => {
        const start = new Date(event.start);
        const end = new Date(event.end || event.start);
        const date = new Date(dateStr);
        return date >= start && date <= end;
    });
}

function renderCalendar() {
    const monthYear = document.getElementById('month-year');
    const calendarGrid = document.getElementById('calendar-grid');

    while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild);
    }

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    monthYear.textContent = new Date(year, month).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.classList.add('day', 'empty');
        calendarGrid.appendChild(emptyCell);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dayCell = document.createElement('div');
        dayCell.classList.add('day');
        dayCell.textContent = day;
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        dayCell.dataset.date = dateStr;

        if (hasEventOnDate(dateStr)) {
            dayCell.classList.add('has-event');
        }

        dayCell.addEventListener('click', () => openModal(dateStr));
        calendarGrid.appendChild(dayCell);
    }
}

function hasEventOnDate(dateStr) {
    return getEventsForDate(dateStr).length > 0;
}

function showAddView(date, eventId = null) {
    selectedDate = date;
    editingEventId = eventId;
    const modal = document.getElementById('event-modal');
    const modalAdd = document.getElementById('modal-add');
    const modalView = document.getElementById('modal-view');
    const startDate = document.getElementById('start-date');
    const endDate = document.getElementById('end-date');
    const eventDetails = document.getElementById('event-details');
    const modalTitle = document.getElementById('modal-title');

    modalView.classList.add('hidden');
    modalAdd.classList.remove('hidden');

    if (eventId && events[eventId]) {
        const event = events[eventId];
        modalTitle.textContent = 'Modifier un événement';
        startDate.value = event.start;
        endDate.value = event.end || event.start;
        eventDetails.value = event.details;
    } else {
        modalTitle.textContent = 'Ajouter un événement';
        startDate.value = date;
        endDate.value = '';
        eventDetails.value = '';
    }
    modal.style.display = 'block';
}

function showEventView(date) {
    selectedDate = date;
    editingEventId = null;
    const modal = document.getElementById('event-modal');
    const modalAdd = document.getElementById('modal-add');
    const modalView = document.getElementById('modal-view');
    const viewDate = document.getElementById('view-date');
    const viewDetailsContainer = document.getElementById('view-details-container');

    modalAdd.classList.add('hidden');
    modalView.classList.remove('hidden');

    viewDate.textContent = new Date(date).toLocaleDateString('fr-FR');
    const eventsForDate = getEventsForDate(date);
    const firstEvent = eventsForDate[0];
    if (firstEvent) {
        const [eventId, event] = firstEvent;
        editingEventId = eventId;
    }
    viewDetailsContainer.innerHTML = eventsForDate.map(([eventId, event]) => {
        const displayEnd = event.end && event.end !== event.start ? ` - ${event.end}` : '';
        return `
            <div class="event-summary">
                <h4>${event.start}${displayEnd}</h4>
                <p>${event.details.replace(/\n/g, '<br>')}</p>
            </div>
        `;
    }).join('');

    modal.style.display = 'block';
}

function openModal(date) {
    if (hasEventOnDate(date)) {
        showEventView(date);
    } else {
        showAddView(date);
    }
}

function closeModal() {
    document.getElementById('event-modal').style.display = 'none';
}

document.getElementById('prev-month').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
});

document.getElementById('next-month').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
});

document.querySelector('.close').addEventListener('click', closeModal);

document.getElementById('switch-to-add').addEventListener('click', () => {
    showAddView(selectedDate);
});

document.getElementById('modify-event').addEventListener('click', () => {
    if (editingEventId) {
        showAddView(selectedDate, editingEventId);
    }
});

document.getElementById('delete-event').addEventListener('click', async () => {
    if (!editingEventId) return;
    delete events[editingEventId];
    await set(eventsRef, events);
    if (hasEventOnDate(selectedDate)) {
        showEventView(selectedDate);
    } else {
        closeModal();
    }
});

document.getElementById('save-event').addEventListener('click', async () => {
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const eventDetails = document.getElementById('event-details').value;

    if (startDate && eventDetails) {
        const eventId = editingEventId || Date.now().toString();
        events[eventId] = {
            start: startDate,
            end: endDate || startDate,
            details: eventDetails
        };
        await set(eventsRef, events);
        showEventView(startDate);
    }
});

window.addEventListener('click', (event) => {
    const modal = document.getElementById('event-modal');
    if (event.target === modal) {
        closeModal();
    }
});

onAuthStateChanged(auth, (user) => {
    if (!user) {
        console.log("❌ Pas connecté");
        return;
    }

    console.log("✅ Connecté :", user.email);

    onValue(eventsRef, (snapshot) => {
        events = snapshot.val() || {};
        renderCalendar();
    });
});
</script>
