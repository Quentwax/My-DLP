<h1 class="titre">Avengers Campus</h1>



<script>
document.querySelectorAll(".dropbtn").forEach(btn => {
    btn.addEventListener("click", () => {

        let content = btn.nextElementSibling;

        // Ferme les autres menus
        document.querySelectorAll(".content").forEach(menu => {
            if(menu !== content) menu.classList.remove("open");
        });

        content.classList.toggle("open");
    });
});
</script>
<div class="boxcontainer">
<div class="box">
<img class="map" src="../land_photos/avengers_campus.jpg" alt="Avengers Campus">
</div>
 </div>

<audio id="music" src="../avengers campus theme.mp3" loop></audio>
<script>
const music = document.getElementById("music");

window.addEventListener("load", () => {
    // RESTAURER LE TEMPS
    let time = parseFloat(localStorage.getItem("musicTime"));
    if (!isNaN(time)) {
        music.currentTime = time;
    }

    // RESTAURER LE VOLUME
    let savedVolume = parseFloat(localStorage.getItem("musicVolume"));
    if (!isNaN(savedVolume)) {
        music.volume = savedVolume;
        volumeSlider.value = savedVolume;
    } else {
        music.volume = 0.5;
        volumeSlider.value = 0.5;
    }

    // RESTAURER L'ÉTAT DE LECTURE
    let wasPlaying = localStorage.getItem("musicPlaying") === "true";
    if (wasPlaying) {
        let promise = music.play();
        if (promise !== undefined) {
            promise.catch(() => {
                // Navigation inter-pages peut empêcher autoplay sans interaction utilisateur
                console.log("Lecture automatique bloquée, appuyez sur Play.");
            });
        }
    } else {
        music.pause();
    }

    playPauseBtn.textContent = music.paused ? "▶️" : "⏸️";
});

/* SAUVEGARDER EN CONTINU */
setInterval(() => {
    localStorage.setItem("musicTime", music.currentTime);
}, 500);
</script>
<script>
window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", music.currentTime);
});
</script>

<!-- Menu de contrôle de la musique -->
<div id="music-floating-btn">🎵</div>
<div id="music-controls" class="hidden">
    <button id="play-pause-btn">⏸️</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
</div>

<script>
const playPauseBtn = document.getElementById("play-pause-btn");
const volumeSlider = document.getElementById("volume-slider");
const floatingBtn = document.getElementById("music-floating-btn");
const controls = document.getElementById("music-controls");

// Initialiser le volume au chargement (sera écrasé par la restauration ci-dessus)
music.volume = 0.5;

// Toggle contrôle
floatingBtn.addEventListener("click", () => {
    controls.classList.toggle("hidden");
});

// Lecture/pause
playPauseBtn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        playPauseBtn.textContent = "⏸️";
        localStorage.setItem("musicPlaying", "true");
    } else {
        music.pause();
        playPauseBtn.textContent = "▶️";
        localStorage.setItem("musicPlaying", "false");
    }
});

// Slider volume
volumeSlider.addEventListener("input", () => {
    music.volume = parseFloat(volumeSlider.value);
    localStorage.setItem("musicVolume", music.volume.toString());
});

// Mettre à jour l'icône quand la musique se termine
music.addEventListener("ended", () => {
    playPauseBtn.textContent = "▶️";
    localStorage.setItem("musicPlaying", "false");
});

// Sauvegarder le statut lors de changement immédiat
music.addEventListener("pause", () => {
    localStorage.setItem("musicPlaying", "false");
});

music.addEventListener("play", () => {
    localStorage.setItem("musicPlaying", "true");
});
</script>

</body>



</html>
