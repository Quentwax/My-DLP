<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Checklist Séjour</title>
<link rel="icon" href="../favicon.png">
<link href="../style.css" rel="stylesheet" />

<style>
body {
    background-color: #d8c7a3;
    padding: 0;
    margin: 0;
}

/* Conteneur date et météo */
.date-meteo-container {
    position: relative;
    height: 130px;
}

/* Bandeau date */
.date-box {
    position: absolute;
    top: 90px;
    left: 20px;
    background: #eee;
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: bold;
    cursor: text;
}

/* Météo */
#meteo-box {
    position: absolute;
    top: 90px;
    right: 20px;
    background: #eee;
    padding: 10px 15px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
}

/* Barre recherche */
.search-container {
    margin: 120px auto 20px;
    width: 60%;
    display: flex;
    align-items: center;
    background: #eee;
    border-radius: 30px;
    padding: 10px 20px;
    position: relative;
    gap: 10px;
}

.search-container input {
    border: none;
    background: transparent;
    width: 100%;
    font-size: 20px;
    outline: none;
}

.search-container button {
    background: #4d7c5a;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 16px;
}

.search-container button:hover {
    background: #3f6847;
}

#filterBtn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    margin-left: 10px;
}

.suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 5px;
    max-height: 200px;
    overflow-y: auto;
    display: none;
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.suggestion-item:hover {
    background: #f0f0f0;
}

/* Filtres */
.filters {
    position: absolute;
    right: 50px;
    top: 150px;
    background: #e9dcc0;
    padding: 15px;
    border-radius: 20px;
    display: none;
}

/* Checklist */
.checklist {
    width: 60%;
    margin: auto;
    background: #e9dcc0;
    padding: 30px;
    border-radius: 20px;
}

.checklist h2 {
    text-align: center;
}

.category {
    margin-top: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 30px 0;
}

.item-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
}

.item-left span {
    word-break: break-word;
}

.item-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 10px;
    flex-shrink: 0;
}

.item-actions button,
.delete {
    background: #cc5c5c;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
}

.item-actions button {
    background: #4d7c5a;
}

.item-actions button:hover,
.delete:hover {
    opacity: 0.85;
}

.delete {
    font-weight: bold;
}

/* MOBILE - Téléphone */
@media (max-width: 768px) {
    .date-meteo-container {
        height: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        gap: 10px;
    }

    .date-box {
        position: static;
        margin: 0;
        display: inline-block;
    }

    #meteo-box {
        position: static;
        margin: 0;
        display: inline-block;
        top: auto;
        right: auto;
    }

    .search-container {
        width: 90%;
        margin: 15px auto;
        font-size: 14px;
        flex-wrap: wrap;
    }

    .search-container input {
        font-size: 16px;
    }

    .search-container button {
        padding: 8px 14px;
        font-size: 14px;
    }

    .checklist {
        width: 95%;
        padding: 15px;
        margin: 10px auto;
        border-radius: 15px;
    }

    .item {
        margin: 20px 0;
        flex-wrap: wrap;
    }

    .item-left {
        width: 100%;
        margin-bottom: 10px;
    }

    .item-actions {
        width: 100%;
        justify-content: flex-end;
    }

    .item-actions button,
    .delete {
        padding: 8px 12px;
        font-size: 12px;
    }

    .search-container button {
        white-space: nowrap;
    }
}

@media (max-width: 480px) {
    .date-meteo-container {
        flex-wrap: wrap;
        padding: 10px 15px;
    }

    .date-box {
        font-size: 13px;
        padding: 8px 15px;
    }

    #meteo-box {
        font-size: 12px;
        padding: 8px 12px;
    }

    .search-container {
        width: 92%;
        padding: 8px 12px;
        flex-direction: column;
    }

    .search-container input {
        font-size: 14px;
        padding: 8px 0;
    }

    .search-container button {
        width: 100%;
        padding: 10px;
    }

    .checklist {
        width: 96%;
        padding: 12px;
    }

    .checklist h2 {
        font-size: 18px;
        margin: 10px 0;
    }

    .item {
        margin: 15px 0;
    }

    .item-left {
        width: 100%;
        gap: 8px;
    }

    .item-left input[type="checkbox"] {
        min-width: 18px;
        width: 18px;
        height: 18px;
    }

    .item-left span {
        font-size: 14px;
    }

    .item-actions {
        width: 100%;
        justify-content: flex-end;
        gap: 6px;
    }

    .item-actions button,
    .delete {
        padding: 6px 8px;
        font-size: 11px;
    }
}
</style>

</head>

<body>

<header class="nav">
    <a href="../index.html" class="logo">✨ Disneyland</a>

    <a href="numb_coaster.html" class="dropbtn">Nombre Attraction</a>
    <a href="../planning.html" class="dropbtn">Planning</a>
    <a href="pin's.html" class="dropbtn">Pin's du Mois</a>
    <a href="checklist.html" class="dropbtn">Checklist</a>
</header>

<!-- DATE ET METEO -->
<div class="date-meteo-container">
    <div class="date-box" contenteditable="true">
        Du ... au ... 2026
    </div>
    <div id="meteo-box">
        🌦️ Chargement météo...
    </div>
</div>

<!-- RECHERCHE -->
<div class="search-container">
    <input type="text" id="search" placeholder="Ajouter une chose...">
    <button id="add-item-btn">Ajouter</button>
    <div class="suggestions" id="suggestions"></div>
</div>

<script>
const apiKey = "d6ee967f1b430c4e4928c102b7f5e360";

async function getWeather() {
  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=48.87&lon=2.78&units=metric&lang=fr&appid=${apiKey}`
    );

    if (!response.ok) {
      throw new Error("Erreur API");
    }

    const data = await response.json();

    const temp = Math.round(data.main.temp);
    const desc = data.weather[0].description;
    const main = data.weather[0].main;

    let conseil = "";

    if (main === "Rain") {
      conseil = "🌧️ Attractions intérieures conseillées";
    } else if (temp >= 28) {
      conseil = "☀️ Attractions d'eau recommandées";
    } else if (temp <= 10) {
      conseil = "🧥 Prends un manteau";
    } else {
      conseil = "👌 Bonne journée pour le parc";
    }

    document.getElementById("meteo-box").innerHTML = `
      🌡️ ${temp}°C <br>
      ${desc} <br>
      <small>${conseil}</small>
    `;

  } catch (error) {
    document.getElementById("meteo-box").innerHTML =
      "❌ Météo indisponible";
    console.error(error);
  }
}

// mise à jour toutes les 10 min
setInterval(getWeather, 600000);

// chargement initial
getWeather();
</script>

<!-- CHECKLIST -->
<div class="checklist">
    <h2>Ma Checklist</h2>

    <div class="category" id="liste">
        <div class="list-items"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBb-2GlOsnUDzDXZ8-mgd6XIr8ny4ZkJoo",
  authDomain: "my-disneyland-paris.firebaseapp.com",
  databaseURL: "https://my-disneyland-paris-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "my-disneyland-paris",
  storageBucket: "my-disneyland-paris.firebasestorage.app",
  messagingSenderId: "787833723893",
  appId: "1:787833723893:web:0cd3c3f0f01dd7e8c09ebc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// 🔥 ID de ta checklist (celle que tu utilises)
const checklistId = "-OreEK4mdavFCG-aXox5";

const search = document.getElementById("search");
const addItemBtn = document.getElementById("add-item-btn");
const dateBox = document.querySelector(".date-box");

let checklistItems = {};
let currentUser = null;

// 🔐 Attendre que l'utilisateur soit connecté
onAuthStateChanged(auth, (user) => {
    if (!user) {
        console.log("❌ Pas connecté");
        return;
    }

    currentUser = user;
    console.log("✅ Connecté :", user.email);

    initApp(); // on lance seulement quand connecté
});

// 🚀 INITIALISATION
function initApp() {
    loadDate();

    const checklistRef = ref(db, `checklist/${checklistId}/items`);

    onValue(checklistRef, (snapshot) => {
        const data = snapshot.val() || {};
        checklistItems = data;
        renderChecklist();
    });
}

// 📅 Charger date
function loadDate() {
    const dateRef = ref(db, `saved_checklists/${checklistId}/date`);
    onValue(dateRef, (snapshot) => {
        const date = snapshot.val() || "Du ... au ... 2026";
        dateBox.textContent = date;
    });
}

// 💾 Sauvegarder date
dateBox.addEventListener('blur', () => {
    if (!currentUser) return;

    const dateRef = ref(db, `saved_checklists/${checklistId}/date`);
    set(dateRef, dateBox.textContent);
});

// ➕ Ajouter item
addItemBtn.addEventListener('click', () => {
    const value = search.value.trim();
    if (value) {
        addItem(value);
        search.value = "";
    }
});

search.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        const value = search.value.trim();
        if (value) {
            addItem(value);
            search.value = "";
        }
    }
});

function addItem(value) {
    if (!currentUser) return;

    const itemId = 'item_' + Date.now();

    const itemData = {
        name: value,
        checked: false,
        order: Date.now()
    };

    const itemRef = ref(db, `saved_checklists/${checklistId}/items/${itemId}`);
    set(itemRef, itemData);
}

// 📋 Affichage
function renderChecklist() {
    const container = document.getElementById('liste').querySelector('.list-items');
    container.innerHTML = '';

    const items = Object.entries(checklistItems)
        .sort(([, a], [, b]) => (a.order || 0) - (b.order || 0));

    items.forEach(([id, item]) => {
        const div = document.createElement("div");
        div.className = "item";
        
        div.innerHTML = `
            <div class="item-left">
                <input type="checkbox" ${item.checked ? 'checked' : ''}>
                <span>${item.name}</span>
            </div>
            <div class="item-actions">
                <button class="move-up">↑</button>
                <button class="move-down">↓</button>
                <button class="delete">✕</button>
            </div>
        `;

        const checkbox = div.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', () => {
            updateItemChecked(id, checkbox.checked);
        });

        div.querySelector('.move-up').addEventListener('click', () => moveItem(id, -1));
        div.querySelector('.move-down').addEventListener('click', () => moveItem(id, 1));
        div.querySelector('.delete').addEventListener('click', () => deleteItem(id));

        container.appendChild(div);
    });
}

// 🔄 Déplacer item
function moveItem(itemId, direction) {
    const items = Object.entries(checklistItems)
        .sort(([, a], [, b]) => (a.order || 0) - (b.order || 0));

    const index = items.findIndex(([id]) => id === itemId);
    if (index === -1) return;

    const targetIndex = index + direction;
    if (targetIndex < 0 || targetIndex >= items.length) return;

    const [currentId, currentItem] = items[index];
    const [targetId, targetItem] = items[targetIndex];

    const updates = {};
    updates[`saved_checklists/${checklistId}/items/${currentId}/order`] = targetItem.order;
    updates[`saved_checklists/${checklistId}/items/${targetId}/order`] = currentItem.order;

    update(ref(db), updates);
}

// ✔ Checkbox FIX
function updateItemChecked(itemId, checked) {
    if (!currentUser) return;

    const itemRef = ref(db, `saved_checklists/${checklistId}/items/${itemId}`);

    update(itemRef, {
        checked: checked
    });
}

// 🗑 Supprimer
function deleteItem(itemId) {
    if (!currentUser) return;

    const itemRef = ref(db, `saved_checklists/${checklistId}/items/${itemId}`);
    remove(itemRef);
}
</script>


</body>
